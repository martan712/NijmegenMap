<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nijmegen Tijdmachine — historische kaarten</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --panel-bg: rgba(20, 24, 31, 0.92);
      --accent: #ff8a3d;
      --text: #e8edf2;
      --muted: #93a1b0;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    #map { position: absolute; inset: 0; background: #aab; }
    .wms-img { transition: opacity .3s ease; image-rendering: auto; }

    /* Title badge */
    #title {
      position: absolute; top: 12px; left: 12px; z-index: 1000;
      background: var(--panel-bg); color: var(--text);
      padding: 8px 14px; border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0,0,0,.35);
      backdrop-filter: blur(6px);
    }
    #title h1 { margin: 0; font-size: 15px; font-weight: 650; letter-spacing: .2px; }
    #title p  { margin: 2px 0 0; font-size: 11px; color: var(--muted); }

    /* Current-year big readout */
    #yearBadge {
      position: absolute; top: 12px; right: 12px; z-index: 1000;
      background: var(--panel-bg); color: var(--text);
      padding: 8px 16px; border-radius: 10px; text-align: right;
      box-shadow: 0 4px 18px rgba(0,0,0,.35);
      backdrop-filter: blur(6px);
    }
    #yearBadge .yr { font-size: 30px; font-weight: 750; line-height: 1; color: var(--accent); }
    #yearBadge .lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }
    #yearBadge .tag {
      display: inline-block; margin-top: 4px; font-size: 10px; text-transform: uppercase;
      letter-spacing: .5px; padding: 1px 6px; border-radius: 6px; background: #2a313c; color: var(--muted);
    }

    /* Bottom control panel */
    #panel {
      position: absolute; left: 50%; bottom: 78px; transform: translateX(-50%);
      z-index: 1000; width: min(880px, calc(100% - 24px));
      background: var(--panel-bg); color: var(--text);
      padding: 14px 18px 12px; border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,.4);
      backdrop-filter: blur(8px);
    }
    .row { display: flex; align-items: center; gap: 12px; }
    .row + .row { margin-top: 10px; }

    button.nav, button.play {
      background: #2a313c; color: var(--text); border: 1px solid #3a4350;
      width: 36px; height: 36px; border-radius: 9px; cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center; flex: 0 0 auto;
    }
    button.nav:hover, button.play:hover { background: #38414f; }
    button.play { background: var(--accent); border-color: var(--accent); color: #1a1d23; font-weight: 700; }

    /* Timeline slider */
    .slider-wrap { flex: 1 1 auto; position: relative; }
    input[type=range].timeline {
      -webkit-appearance: none; appearance: none; width: 100%; height: 6px;
      background: linear-gradient(90deg, #4a5566, #6d7b8e); border-radius: 4px; outline: none;
    }
    input[type=range].timeline::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%;
      background: var(--accent); border: 3px solid #1a1d23; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,.4);
    }
    input[type=range].timeline::-moz-range-thumb {
      width: 20px; height: 20px; border-radius: 50%; background: var(--accent);
      border: 3px solid #1a1d23; cursor: pointer;
    }
    .ticks { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-top: 4px; }

    .ctrl { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
    .ctrl input[type=range] { width: 120px; }
    select {
      background: #2a313c; color: var(--text); border: 1px solid #3a4350;
      border-radius: 8px; padding: 5px 8px; font-size: 12px;
    }
    .spacer { flex: 1 1 auto; }

    button.chip {
      background: #2a313c; color: var(--text); border: 1px solid #3a4350;
      border-radius: 8px; padding: 6px 10px; font-size: 12px; cursor: pointer; white-space: nowrap;
    }
    button.chip:hover { background: #38414f; }
    button.chip.active { background: var(--accent); border-color: var(--accent); color: #1a1d23; font-weight: 700; }

    /* City-growth legend */
    #growthLegend {
      position: absolute; top: 78px; left: 12px; z-index: 900; display: none;
      background: var(--panel-bg); color: var(--text); padding: 10px 12px;
      border-radius: 10px; box-shadow: 0 4px 18px rgba(0,0,0,.35); backdrop-filter: blur(6px);
      max-width: 200px; font-size: 12px;
    }
    #growthLegend .lg-title { font-weight: 650; margin-bottom: 6px; font-size: 12px; }
    #growthLegend .lg-row { display: flex; align-items: center; gap: 7px; line-height: 1.5; }
    #growthLegend .sw { width: 12px; height: 12px; border-radius: 3px; flex: 0 0 auto; border: 1px solid rgba(0,0,0,.3); }
    #growthLegend .lg-row.future { opacity: .4; }
    .leaflet-popup-content { font-size: 13px; line-height: 1.45; max-height: 260px; overflow-y: auto; }
    .leaflet-popup-content .pp { font-weight: 700; color: #b5341f; }
    .leaflet-popup-content .pw { color: #555; font-size: 12px; margin: 2px 0 6px; }

    /* Spyglass lens ring (follows the cursor) */
    #lens {
      position: absolute; z-index: 800; pointer-events: none; display: none;
      width: 260px; height: 260px; margin: -130px 0 0 -130px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.9);
      box-shadow: 0 0 0 1px rgba(0,0,0,.5), 0 4px 18px rgba(0,0,0,.4), inset 0 0 14px rgba(0,0,0,.35);
    }
    #lens .lensYr {
      position: absolute; top: -26px; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: #1a1d23; font-weight: 700; font-size: 12px;
      padding: 1px 8px; border-radius: 6px; white-space: nowrap;
    }
    a.cred { color: var(--muted); font-size: 11px; text-decoration: none; }
    a.cred:hover { color: var(--text); }

    /* --- Story navigation (the "fractal book") --- */
    /* Spine: a thin ribbon of chapters, always on screen. */
    #spine {
      position: absolute; left: 50%; bottom: 14px; transform: translateX(-50%);
      z-index: 1000; display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
      width: min(940px, calc(100% - 24px));
      background: var(--panel-bg); padding: 8px 10px; border-radius: 12px;
      box-shadow: 0 6px 24px rgba(0,0,0,.4); backdrop-filter: blur(8px);
    }
    .spine-chip {
      background: transparent; color: var(--muted); border: 1px solid transparent;
      border-radius: 8px; padding: 5px 11px; font-size: 12px; cursor: pointer; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
    }
    .spine-chip:hover { background: #2a313c; color: var(--text); }
    .spine-chip.active { background: var(--accent); border-color: var(--accent); color: #1a1d23; font-weight: 700; }
    .spine-chip .sn { font-size: 10px; opacity: .7; }
    .spine-chip.free { margin-left: auto; border-color: #3a4350; color: var(--text); }
    .spine-sep { width: 1px; background: #3a4350; margin: 2px 2px; align-self: stretch; }

    /* Story card: chapter intro / thread cards / scene caption, above the spine. */
    #story {
      position: absolute; left: 50%; bottom: 78px; transform: translateX(-50%);
      z-index: 1000; width: min(620px, calc(100% - 24px));
      background: var(--panel-bg); color: var(--text);
      padding: 16px 20px; border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,.42); backdrop-filter: blur(8px);
    }
    #story h2 { margin: 0 0 4px; font-size: 18px; font-weight: 700; }
    #story .intro { margin: 0 0 12px; font-size: 13px; color: var(--muted); line-height: 1.5; }
    #story .crumb { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    #story .scene-title { margin: 0 0 6px; font-size: 17px; font-weight: 700; }
    #story .scene-text { margin: 0 0 14px; font-size: 13.5px; color: var(--text); line-height: 1.55; }

    .thread-cards { display: flex; flex-direction: column; gap: 8px; }
    .thread-card {
      text-align: left; background: #2a313c; color: var(--text); border: 1px solid #3a4350;
      border-radius: 10px; padding: 10px 13px; cursor: pointer;
    }
    .thread-card:hover { background: #38414f; border-color: var(--accent); }
    .thread-card .tc-title { font-size: 13.5px; font-weight: 650; }
    .thread-card .tc-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .scene-nav { display: flex; align-items: center; gap: 12px; }
    .scene-nav .dots { display: flex; gap: 6px; flex: 1 1 auto; justify-content: center; }
    .scene-nav .dot { width: 8px; height: 8px; border-radius: 50%; background: #3a4350; cursor: pointer; border: none; padding: 0; }
    .scene-nav .dot.on { background: var(--accent); }
    .story-back {
      background: transparent; color: var(--muted); border: none; cursor: pointer;
      font-size: 12px; padding: 0; margin-bottom: 10px;
    }
    .story-back:hover { color: var(--text); }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="lens"><span class="lensYr" id="lensYr"></span></div>
  <div id="growthLegend"><div class="lg-title">Stadsontwikkeling</div></div>

  <div id="title">
    <h1>Nijmegen Tijdmachine</h1>
    <p>Historische kaarten &amp; luchtfoto's · 1557 – 2025</p>
  </div>

  <div id="yearBadge">
    <div class="yr" id="yrText">1557</div>
    <div class="lbl" id="yrLabel">Renaissance</div>
    <div class="tag" id="yrTag">kaart</div>
  </div>

  <div id="story"></div>
  <div id="spine"></div>

  <div id="panel" style="display:none">
    <div class="row">
      <button class="nav" id="prevBtn" title="Vorige (←)">‹</button>
      <button class="play" id="playBtn" title="Afspelen">▶</button>
      <button class="nav" id="nextBtn" title="Volgende (→)">›</button>
      <div class="slider-wrap">
        <input type="range" class="timeline" id="slider" min="0" max="0" step="1" value="0" />
        <div class="ticks" id="ticks"></div>
      </div>
    </div>
    <div class="row">
      <div class="ctrl">
        <label for="opacity">Transparantie</label>
        <input type="range" id="opacity" min="0" max="1" step="0.02" value="1" />
      </div>
      <div class="ctrl">
        <label for="filter">Toon</label>
        <select id="filter">
          <option value="all">Alles</option>
          <option value="map">Alleen kaarten</option>
          <option value="aerial">Alleen luchtfoto's</option>
        </select>
      </div>
      <div class="ctrl">
        <button class="chip" id="spyBtn" title="Vergelijk-loep (V)">🔍 Vergelijk</button>
        <select id="spyYear" style="display:none"></select>
      </div>
      <div class="ctrl">
        <button class="chip" id="growthBtn" title="Stadsontwikkeling (G)">🏗 Groei</button>
      </div>
      <div class="spacer"></div>
      <a class="cred" href="https://services.nijmegen.nl/geoservices/wms/extern_Historie_raster?request=GetCapabilities&service=WMS" target="_blank" rel="noopener">Bron: Gemeente Nijmegen (WMS)</a>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map("map", { zoomControl: true, minZoom: 12, maxZoom: 19, zoomSnap: 0.5 })
      .setView([51.8475, 5.8625], 15);

    // Dedicated pane for the historical layers: above the modern basemap
    // (tilePane z200) but below the live-detail overlay (overlayPane z400).
    map.createPane("hist");
    map.getPane("hist").style.zIndex = 350;
    const BLANK = "data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==";

    // Modern reference basemap (Web Mercator) underneath everything.
    L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
      attribution: '&copy; OpenStreetMap, &copy; CARTO',
      maxZoom: 20
    }).addTo(map);

    // --- State ---
    let manifest = [];     // full list from maps.json (chronological)
    let timeline = [];     // current filtered view
    let current = 0;
    let activeOverlay = null;
    let opacity = 1;
    let playing = false;
    let playTimer = null;

    // Story mode drives the map from a scene config instead of the slider; the
    // sharp live overlay and overlays read the "active" entry from whichever is live.
    let storyMode = true;
    let storyEntry = null;
    function activeEntry() { return storyMode ? storyEntry : timeline[current]; }

    // Per-layer base: a local XYZ tile pyramid (fast, fully local) when built,
    // else a single anchored image (fallback before build_tiles.py has run).
    const layerCache = new Map();   // file -> L.tileLayer | L.imageOverlay

    function baseFor(entry) {
      if (layerCache.has(entry.file)) return layerCache.get(entry.file);
      let lyr;
      if (entry.tiles) {
        lyr = L.tileLayer(entry.tiles, {
          pane: "hist", bounds: entry.bounds, opacity: 0, className: "wms-img",
          minNativeZoom: entry.minzoom, maxNativeZoom: entry.maxzoom,
          minZoom: 12, maxZoom: 19, errorTileUrl: BLANK, keepBuffer: 2
        });
      } else {
        lyr = L.imageOverlay(entry.file, entry.bounds, {
          pane: "hist", opacity: 0, interactive: false, className: "wms-img"
        });
      }
      layerCache.set(entry.file, lyr);
      return lyr;
    }

    // The local pyramid is crisp only up to each layer's maxzoom; beyond that we
    // fetch a sharp live WMS render of the current viewport and lay it on top.
    function liveMax(entry) { return entry && entry.maxzoom != null ? entry.maxzoom : 15; }
    let liveOverlay = null;
    let liveToken = 0;

    function clearLive() {
      liveToken++;
      if (liveOverlay) { map.removeLayer(liveOverlay); liveOverlay = null; }
    }

    function updateLive() {
      const entry = activeEntry();
      if (!entry || map.getZoom() <= liveMax(entry)) { clearLive(); return; }
      const b = map.getBounds().pad(0.08);
      const sw = b.getSouthWest(), ne = b.getNorthEast();
      const size = map.getSize();
      const dpr = Math.min(2, window.devicePixelRatio || 1);
      const w = Math.min(3999, Math.round(size.x * dpr * 1.16));
      const h = Math.min(3999, Math.round(size.y * dpr * 1.16));
      const params = new URLSearchParams({
        service: "WMS", request: "GetMap", version: "1.3.0",
        layers: entry.layers, styles: "", crs: "EPSG:4326",
        format: "image/png", transparent: "true", width: w, height: h,
        // WMS 1.3.0 + EPSG:4326 axis order = lat,lon (south,west,north,east)
        bbox: [sw.lat, sw.lng, ne.lat, ne.lng].join(",")
      });
      const token = ++liveToken;
      const img = L.imageOverlay(entry.wms + "?" + params.toString(), b, {
        opacity: 0, interactive: false, className: "wms-img", zIndex: 650
      }).addTo(map);
      img.on("load", () => {
        if (token !== liveToken) { map.removeLayer(img); return; }  // superseded
        img.setOpacity(opacity);
        const old = liveOverlay;
        liveOverlay = img;
        if (old && old !== img) setTimeout(() => map.removeLayer(old), 320);
      });
      img.on("error", () => { if (img !== liveOverlay) map.removeLayer(img); });
    }

    let liveTimer = null;
    map.on("moveend zoomend", () => {
      clearTimeout(liveTimer);
      liveTimer = setTimeout(updateLive, 160);
    });

    const slider = document.getElementById("slider");
    const ticksEl = document.getElementById("ticks");
    const yrText = document.getElementById("yrText");
    const yrLabel = document.getElementById("yrLabel");
    const yrTag = document.getElementById("yrTag");

    function applyFilter(mode) {
      timeline = manifest.filter(l => mode === "all" ? true : l.type === mode);
      slider.max = Math.max(0, timeline.length - 1);
      buildTicks();
      if (current > timeline.length - 1) current = timeline.length - 1;
      show(current);
      populateSpyYears();
      if (spyOn) setSpyLayer();
    }

    function buildTicks() {
      ticksEl.innerHTML = "";
      const n = timeline.length;
      if (!n) return;
      const count = Math.min(6, n);
      for (let i = 0; i < count; i++) {
        const idx = Math.round(i * (n - 1) / (count - 1));
        const span = document.createElement("span");
        span.textContent = timeline[idx].year;
        ticksEl.appendChild(span);
      }
    }

    // Crossfade the base map/aerial layer for an entry. Reused by the slider and
    // the story engine.
    function setBase(entry) {
      const ov = baseFor(entry);
      if (!map.hasLayer(ov)) { ov.setOpacity(0); ov.addTo(map); }
      requestAnimationFrame(() => requestAnimationFrame(() => ov.setOpacity(opacity)));
      const old = activeOverlay;
      activeOverlay = ov;
      if (old && old !== ov) {
        old.setOpacity(0);
        setTimeout(() => { if (activeOverlay !== old) map.removeLayer(old); }, 320);
      }
      return ov;
    }
    // Pick a manifest entry for a year (prefer maps; never a wo2 clone).
    function entryByYear(year) {
      const c = manifest.filter(e => e.year === year && e.type !== "wo2");
      return c.find(e => e.type === "map") || c[0] || manifest.find(e => e.year === year);
    }

    // Update the top-right year readout. Optional overrides let story scenes
    // show a different headline (e.g. "1944" over a 1938 base map).
    function setBadge(entry, opts) {
      opts = opts || {};
      yrText.textContent = opts.label || entry.label || entry.year;
      yrLabel.textContent = opts.era != null ? opts.era : (entry.era || "");
      yrTag.textContent = opts.tag || (entry.type === "aerial" ? "luchtfoto"
        : entry.type === "wo2" ? "oorlog" : "kaart");
    }

    function show(i) {
      if (!timeline.length) return;
      current = Math.max(0, Math.min(i, timeline.length - 1));
      slider.value = current;
      const entry = timeline[current];

      setBase(entry);
      setBadge(entry);

      // Refresh the sharp live layer for the newly selected year (if zoomed in).
      clearLive();
      updateLive();
      if (growthOn) growthUpdate();
      setWO2(entry);
    }

    // --- Controls ---
    slider.addEventListener("input", e => show(+e.target.value));
    document.getElementById("prevBtn").addEventListener("click", () => show(current - 1));
    document.getElementById("nextBtn").addEventListener("click", () => show(current + 1));
    document.getElementById("opacity").addEventListener("input", e => {
      opacity = +e.target.value;
      if (activeOverlay) activeOverlay.setOpacity(opacity);
      if (liveOverlay) liveOverlay.setOpacity(opacity);
    });
    document.getElementById("filter").addEventListener("change", e => applyFilter(e.target.value));

    const playBtn = document.getElementById("playBtn");
    function togglePlay() {
      playing = !playing;
      playBtn.textContent = playing ? "❚❚" : "▶";
      if (playing) {
        playTimer = setInterval(() => {
          if (current >= timeline.length - 1) { show(0); }
          else { show(current + 1); }
        }, 1400);
      } else {
        clearInterval(playTimer);
      }
    }
    playBtn.addEventListener("click", togglePlay);

    // --- Spyglass: a circular lens that follows the cursor and shows a second
    // (compare) year, so you can peek between two eras at the same spot. ---
    const spyPane = map.createPane("spy");
    spyPane.style.zIndex = 500;            // above hist (350) and live (overlay 400)
    spyPane.style.pointerEvents = "none";
    const LENS_HIDDEN = "circle(0px at -300px -300px)";
    spyPane.style.clipPath = LENS_HIDDEN;
    const LENS_R = 130;                    // matches #lens radius (260/2)

    const lensEl = document.getElementById("lens");
    const lensYrEl = document.getElementById("lensYr");
    const spyBtn = document.getElementById("spyBtn");
    const spyYearSel = document.getElementById("spyYear");
    let spyOn = false, spyLayer = null, lastCp = null;
    const spyCache = new Map();            // file -> layer (in the 'spy' pane)

    function spyLayerFor(entry) {
      if (spyCache.has(entry.file)) return spyCache.get(entry.file);
      let lyr;
      if (entry.tiles) {
        lyr = L.tileLayer(entry.tiles, {
          pane: "spy", bounds: entry.bounds, errorTileUrl: BLANK, keepBuffer: 2,
          minNativeZoom: entry.minzoom, maxNativeZoom: entry.maxzoom, minZoom: 12, maxZoom: 19
        });
      } else {
        lyr = L.imageOverlay(entry.file, entry.bounds, { pane: "spy", interactive: false });
      }
      spyCache.set(entry.file, lyr);
      return lyr;
    }

    function populateSpyYears() {
      spyYearSel.innerHTML = "";
      timeline.forEach((e, i) => {
        const o = document.createElement("option");
        o.value = i; o.textContent = e.label || e.year;
        spyYearSel.appendChild(o);
      });
      spyYearSel.value = Math.max(0, timeline.length - 1);   // default: newest
    }

    function setSpyLayer() {
      const e = timeline[+spyYearSel.value];
      if (!e) return;
      const lyr = spyLayerFor(e);
      if (spyLayer && spyLayer !== lyr) map.removeLayer(spyLayer);
      spyLayer = lyr;
      if (spyOn && !map.hasLayer(lyr)) lyr.addTo(map);
      lensYrEl.textContent = e.label || e.year;
    }

    function positionLens(cp) {
      if (!cp) return;
      lastCp = cp;
      const mp = L.DomUtil.getPosition(map.getPane("mapPane"));
      spyPane.style.clipPath = `circle(${LENS_R}px at ${cp.x - mp.x}px ${cp.y - mp.y}px)`;
      lensEl.style.left = cp.x + "px";
      lensEl.style.top = cp.y + "px";
    }

    map.on("mousemove", e => { if (spyOn) positionLens(e.containerPoint); });
    map.on("move zoom", () => { if (spyOn) positionLens(lastCp); });
    map.getContainer().addEventListener("mouseleave", () => {
      if (spyOn) { lensEl.style.display = "none"; spyPane.style.clipPath = LENS_HIDDEN; }
    });
    map.getContainer().addEventListener("mouseenter", () => { if (spyOn) lensEl.style.display = "block"; });

    function toggleSpy() {
      spyOn = !spyOn;
      spyBtn.classList.toggle("active", spyOn);
      spyYearSel.style.display = spyOn ? "" : "none";
      if (spyOn) {
        setSpyLayer();
        lensEl.style.display = "block";
        positionLens(lastCp || map.latLngToContainerPoint(map.getCenter()));
      } else {
        if (spyLayer) map.removeLayer(spyLayer);
        lensEl.style.display = "none";
        spyPane.style.clipPath = LENS_HIDDEN;
      }
    }
    spyBtn.addEventListener("click", toggleSpy);
    spyYearSel.addEventListener("change", setSpyLayer);

    // --- City growth (Stadsontwikkeling): CHW polygons from the city's WFS,
    // colored by development period and revealed cumulatively as the slider moves. ---
    const growthPane = map.createPane("growth");
    growthPane.style.zIndex = 450;        // above hist(350) & live(400), below spy(500)
    const PERIODS = ["Voor 1230", "1250-1400", "1400-1525", "1525-1874", "1900", "1915",
      "1925", "1935", "1955", "1965", "1975", "1985", "2000", "Lent", "Veur Lent"];
    // representative "established by" year for the cumulative reveal
    const PERIOD_YEAR = { "Voor 1230": 1230, "1250-1400": 1400, "1400-1525": 1525,
      "1525-1874": 1874, "1900": 1900, "1915": 1915, "1925": 1925, "1935": 1935,
      "1955": 1955, "1965": 1965, "1975": 1975, "1985": 1985, "2000": 2000,
      // Lent / Veur Lent are the recent Waalsprong expansion north of the river,
      // not the medieval village — the source lists them after 2000.
      "Lent": 2003, "Veur Lent": 2015 };
    function periodColor(p) {
      const i = PERIODS.indexOf(p), n = PERIODS.length - 1;
      return `hsl(${8 + (i < 0 ? 0 : i) / n * 250} 70% 50%)`;   // red(old) → blue(new)
    }
    const growthBtn = document.getElementById("growthBtn");
    const legendEl = document.getElementById("growthLegend");
    let growthOn = false, growthLayer = null, growthLoaded = false;
    // In story mode the reveal year comes from the scene, not the slider.
    let growthYearOverride = null;

    function curYear() {
      const e = activeEntry();
      return e ? (typeof e.year === "number" ? e.year : parseInt(e.year, 10)) : 0;
    }
    function growthYear() { return growthYearOverride != null ? growthYearOverride : curYear(); }
    function growthStyle(f) {
      const p = f.properties.PERIODE, built = PERIOD_YEAR[p] <= growthYear();
      return { pane: "growth", color: built ? "#1a1d23" : periodColor(p), weight: 1,
        opacity: built ? 0.7 : 0.35, dashArray: built ? null : "3 4",
        fillColor: periodColor(p), fillOpacity: built ? 0.5 : 0.0 };
    }
    function buildLegend() {
      legendEl.querySelectorAll(".lg-row").forEach(n => n.remove());
      PERIODS.forEach(p => {
        const row = document.createElement("div");
        row.className = "lg-row"; row.dataset.p = p;
        row.innerHTML = `<span class="sw" style="background:${periodColor(p)}"></span><span>${p}</span>`;
        legendEl.appendChild(row);
      });
    }
    function growthUpdate() {
      if (!growthLayer) return;
      growthLayer.setStyle(growthStyle);
      const y = growthYear();
      growthLayer.eachLayer(layer => {
        const built = PERIOD_YEAR[layer.feature.properties.PERIODE] <= y;
        layer.options.interactive = built;        // only built areas are clickable
        const el = layer._path;
        if (el) {
          el.style.pointerEvents = built ? "auto" : "none";
          el.classList.toggle("leaflet-interactive", built);
        }
        if (!built && layer.isPopupOpen()) layer.closePopup();
      });
      legendEl.querySelectorAll(".lg-row").forEach(r =>
        r.classList.toggle("future", !(PERIOD_YEAR[r.dataset.p] <= y)));
    }
    function loadGrowth(cb) {
      if (growthLoaded) { cb && cb(); return; }
      fetch("data/stadsontwikkeling.geojson").then(r => r.json()).then(gj => {
        growthLayer = L.geoJSON(gj, {
          pane: "growth", style: growthStyle,
          onEachFeature: (f, layer) => {
            const pr = f.properties;
            layer.bindPopup(`<div class="pp">${pr.PERIODE}</div>` +
              (pr.WIJKEN && pr.WIJKEN !== "None" ? `<div class="pw">${pr.WIJKEN}</div>` : "") +
              `<div>${pr.OMSCHRIJVING || ""}</div>`, { maxWidth: 330 });
          }
        });
        growthLoaded = true; buildLegend(); cb && cb();
      }).catch(e => console.error("growth load failed", e));
    }
    function toggleGrowth() {
      growthOn = !growthOn;
      growthBtn.classList.toggle("active", growthOn);
      if (growthOn) {
        loadGrowth(() => { growthLayer.addTo(map); growthUpdate(); });
        legendEl.style.display = "block";
      } else {
        if (growthLayer) map.removeLayer(growthLayer);
        legendEl.style.display = "none";
      }
    }
    growthBtn.addEventListener("click", toggleGrowth);

    // Story-mode growth control: reveal polygons up to `upto`, or hide entirely.
    function storyGrowth(upto) {
      growthYearOverride = upto;
      if (upto == null) {
        if (!growthOn && growthLayer) map.removeLayer(growthLayer);
        if (!growthOn) legendEl.style.display = "none";
        return;
      }
      loadGrowth(() => { if (!map.hasLayer(growthLayer)) growthLayer.addTo(map); growthUpdate(); });
      legendEl.style.display = "block";
    }

    // --- WW2 damage events (extern_wo2): dedicated 1944 timeline stops. Each
    // shows all 1944 building footprints (gray, canvas) with that event's damage
    // polygons in red on top; earlier events stay faintly visible (cumulative). ---
    map.createPane("wo2bg").style.zIndex = 455;   // 1944 buildings (context)
    map.createPane("wo2").style.zIndex = 460;     // damage polygons, above buildings
    const WO2_EVENTS = [
      { cat: "Bombardement 22 feb", label: "Bombardement", era: "22 februari 1944",
        desc: "22 februari 1944 — Amerikaans vergissingsbombardement; grote delen van het centrum verwoest." },
      { cat: "Bevrijding 17-21 sep", label: "Bevrijding", era: "17–21 september 1944",
        desc: "17–21 september 1944 — strijd om de Waalbrug tijdens Operatie Market Garden." },
      { cat: "Granatentijd 22 sep", label: "Granatentijd", era: "vanaf 22 september 1944",
        desc: "Vanaf 22 september 1944 — Nijmegen als frontstad onder Duitse granaatbeschietingen." },
    ];
    const WO2_ORDER = {}, WO2_DESC = {};
    WO2_EVENTS.forEach((e, i) => { WO2_ORDER[e.cat] = i + 1; WO2_DESC[e.cat] = e.desc; });
    let wo2Dmg = null, wo2Bldg = null, wo2Loaded = false;

    function wo2Style(f, curOrder) {
      const o = WO2_ORDER[f.properties.CATEGORIE] || 99;
      // Always set stroke/fill in BOTH branches — setStyle only overrides keys
      // you pass, so omitting them leaves a previously-hidden feature stuck off.
      if (o > curOrder) return { pane: "wo2", stroke: false, fill: false, fillOpacity: 0, opacity: 0 };
      const cur = o === curOrder;
      return { pane: "wo2", stroke: true, fill: true,
        color: cur ? "#e8281e" : "#7a1d16", weight: 1,
        opacity: cur ? 0.9 : 0.45, fillColor: cur ? "#e8281e" : "#5c1712",
        fillOpacity: cur ? 0.55 : 0.25 };
    }
    function wo2Update(curOrder) {
      if (!wo2Dmg) return;
      wo2Dmg.setStyle(f => wo2Style(f, curOrder));
      wo2Dmg.eachLayer(layer => {
        const vis = (WO2_ORDER[layer.feature.properties.CATEGORIE] || 99) <= curOrder;
        layer.options.interactive = vis;
        const el = layer._path;
        if (el) { el.style.pointerEvents = vis ? "auto" : "none"; el.classList.toggle("leaflet-interactive", vis); }
        if (!vis && layer.isPopupOpen()) layer.closePopup();
      });
    }
    function loadWO2(cb) {
      if (wo2Loaded) { cb && cb(); return; }
      Promise.all([
        fetch("data/his_1944_bebouwing.geojson").then(r => r.json()),
        fetch("data/wo2_oorlogsschade.geojson").then(r => r.json())
      ]).then(([bldg, dmg]) => {
        wo2Bldg = L.geoJSON(bldg, { pane: "wo2bg", interactive: false,
          renderer: L.canvas({ pane: "wo2bg" }),
          style: { color: "#5b5048", weight: 0.4, fillColor: "#cabfb2", fillOpacity: 0.85 } });
        wo2Dmg = L.geoJSON(dmg, { pane: "wo2",
          onEachFeature: (f, layer) => {
            const cat = f.properties.CATEGORIE;
            layer.bindPopup(`<div class="pp">${cat}</div><div>${WO2_DESC[cat] || ""}</div>`, { maxWidth: 300 });
          } });
        wo2Loaded = true; cb && cb();
      }).catch(e => console.error("WO2 load failed", e));
    }
    function showWO2(order) {
      loadWO2(() => {
        if (!map.hasLayer(wo2Bldg)) wo2Bldg.addTo(map);
        if (!map.hasLayer(wo2Dmg)) wo2Dmg.addTo(map);
        wo2Update(order);
      });
    }
    function hideWO2() {
      if (wo2Bldg && map.hasLayer(wo2Bldg)) map.removeLayer(wo2Bldg);
      if (wo2Dmg && map.hasLayer(wo2Dmg)) map.removeLayer(wo2Dmg);
    }
    function setWO2(entry) {
      if (entry && entry.type === "wo2") showWO2(entry.wo2order);
      else hideWO2();
    }

    // --- Fortifications (CHW_VESTINGWERKEN): 7 dated ring lines, revealed
    // cumulatively up to a scene's `fortUpto` year. Story-mode only. ---
    map.createPane("fort").style.zIndex = 458;
    const fortYearOf = p => Math.max(...(p.match(/\d{4}/g) || ["0"]).map(Number));
    function fortColor(p) {
      // chronological position → red(old) → blue(new), like the growth ramp
      const y = fortYearOf(p);
      const t = Math.max(0, Math.min(1, (y - 1300) / (1732 - 1300)));
      return `hsl(${10 + t * 230} 75% 52%)`;
    }
    let fortLayer = null, fortLoaded = false, fortYearOverride = null;
    function fortStyle(f) {
      const on = fortYearOverride == null || fortYearOf(f.properties.PERIODE) <= fortYearOverride;
      return { pane: "fort", color: fortColor(f.properties.PERIODE),
        weight: on ? 3 : 0, opacity: on ? 0.92 : 0 };
    }
    function loadFort(cb) {
      if (fortLoaded) { cb && cb(); return; }
      fetch("data/vestingwerken.geojson").then(r => r.json()).then(gj => {
        fortLayer = L.geoJSON(gj, { pane: "fort", style: fortStyle,
          onEachFeature: (f, layer) => layer.bindPopup(
            `<div class="pp">${f.properties.PERIODE}</div><div>${f.properties.TOELICHTING || ""}</div>`,
            { maxWidth: 320 }) });
        fortLoaded = true; cb && cb();
      }).catch(e => console.error("fort load failed", e));
    }
    function storyFort(upto) {
      fortYearOverride = upto;
      if (upto == null) { if (fortLayer && map.hasLayer(fortLayer)) map.removeLayer(fortLayer); return; }
      loadFort(() => { if (!map.hasLayer(fortLayer)) fortLayer.addTo(map); fortLayer.setStyle(fortStyle); });
    }

    // --- City wall (HIS_STADSMUUR): 36 tower/gate points. Story-mode only. ---
    map.createPane("wall").style.zIndex = 459;
    let wallLayer = null, wallLoaded = false;
    function loadWall(cb) {
      if (wallLoaded) { cb && cb(); return; }
      fetch("data/stadsmuur.geojson").then(r => r.json()).then(gj => {
        wallLayer = L.geoJSON(gj, {

            color: "#1a1d23", weight: 1.5, fillColor: "#ffd27d", fillOpacity: 0.95 }),

            `<div class="pp">Stadsmuur</div><div>Punt ${f.properties.NUMMER ?? f.properties.ID}</div>`,
            { maxWidth: 220 })
        });
        wallLoaded = true; cb && cb();
      }).catch(e => console.error("wall load failed", e));
    }
    function storyWall(on) {
      if (!on) { if (wallLayer && map.hasLayer(wallLayer)) map.removeLayer(wallLayer); return; }
      loadWall(() => { if (!map.hasLayer(wallLayer)) wallLayer.addTo(map); });

    // --- Story state + DOM ---
    const storyEl = document.getElementById("story");
    const spineEl = document.getElementById("spine");
    const panelEl = document.getElementById("panel");
    let chapIdx = null, threadIdx = null, sceneIdx = 0;

    // Reset every story-driven overlay (used when leaving a scene / entering free mode).
    function clearStoryOverlays() {
      storyGrowth(null); storyFort(null); storyWall(false); hideWO2();
    }

    // Render a single scene's full map state.
    function applyScene(scene) {
      const entry = entryByYear(scene.year) || manifest.find(e => e.type !== "wo2");
      if (entry) {
        storyEntry = entry;
        setBase(entry);
        setBadge(entry, { label: scene.badge, era: scene.era, tag: scene.tag });
      }
      if (scene.focus) map.flyToBounds(scene.focus, { duration: 0.85, padding: [20, 20] });
      storyGrowth(scene.growthUpto != null ? scene.growthUpto : null);
      storyFort(scene.fortUpto != null ? scene.fortUpto : null);
      storyWall(!!scene.wall);
      if (scene.ww2Order != null) showWO2(scene.ww2Order); else hideWO2();
      clearLive(); updateLive();
    }

    function renderSpine() {
      spineEl.innerHTML = "";
      CHAPTERS.forEach((ch, i) => {
        const b = document.createElement("button");
        b.className = "spine-chip" + (storyMode && i === chapIdx ? " active" : "");
        b.innerHTML = `<span class="sn">${i + 1}</span>${ch.title}`;
        b.title = ch.short;
        b.addEventListener("click", () => openChapter(i));
        spineEl.appendChild(b);
      });
      const sep = document.createElement("div"); sep.className = "spine-sep"; spineEl.appendChild(sep);
      const free = document.createElement("button");
      free.className = "spine-chip free" + (!storyMode ? " active" : "");
      free.textContent = "Vrij verkennen";
      free.addEventListener("click", enterFree);
      spineEl.appendChild(free);
    }

    function openChapter(i) {
      storyMode = true; chapIdx = i; threadIdx = null;
      panelEl.style.display = "none"; storyEl.style.display = "";
      clearStoryOverlays();
      const ch = CHAPTERS[i];
      if (ch.year != null) {
        const entry = entryByYear(ch.year);
        if (entry) { storyEntry = entry; setBase(entry); setBadge(entry); clearLive(); updateLive(); }
      }
      if (ch.focus) map.flyToBounds(ch.focus, { duration: 0.85, padding: [20, 20] });
      storyEl.innerHTML =
        `<div class="crumb">Hoofdstuk ${i + 1}</div>` +
        `<h2>${ch.title}</h2>` +
        `<p class="intro">${ch.intro}</p>` +
        `<div class="thread-cards"></div>`;
      const wrap = storyEl.querySelector(".thread-cards");
      ch.threads.forEach((t, ti) => {
        const c = document.createElement("button");
        c.className = "thread-card";
        c.innerHTML = `<div class="tc-title">${t.title}</div>` +
          `<div class="tc-sub">${t.sub || (t.scenes.length + " scènes")}</div>`;
        c.addEventListener("click", () => openThread(ti));
        wrap.appendChild(c);
      });
      renderSpine();
    }

    function openThread(ti) {
      threadIdx = ti; sceneIdx = 0;
      renderScene();
    }

    function gotoScene(si) {
      const scenes = CHAPTERS[chapIdx].threads[threadIdx].scenes;
      sceneIdx = Math.max(0, Math.min(si, scenes.length - 1));
      renderScene();
    }

    function renderScene() {
      const ch = CHAPTERS[chapIdx], thread = ch.threads[threadIdx];
      const scenes = thread.scenes, scene = scenes[sceneIdx];
      applyScene(scene);
      storyEl.innerHTML =
        `<button class="story-back">‹ ${ch.title}</button>` +
        `<div class="crumb">${thread.title} · ${sceneIdx + 1}/${scenes.length}</div>` +
        `<h3 class="scene-title">${scene.title}</h3>` +
        `<p class="scene-text">${scene.text}</p>` +
        `<div class="scene-nav">` +
          `<button class="nav" id="scPrev" ${sceneIdx === 0 ? "disabled" : ""}>‹</button>` +
          `<div class="dots"></div>` +
          `<button class="nav" id="scNext">${sceneIdx === scenes.length - 1 ? "✓" : "›"}</button>` +
        `</div>`;
      const dots = storyEl.querySelector(".dots");
      scenes.forEach((_, si) => {
        const d = document.createElement("button");
        d.className = "dot" + (si === sceneIdx ? " on" : "");
        d.addEventListener("click", () => gotoScene(si));
        dots.appendChild(d);
      });
      storyEl.querySelector(".story-back").addEventListener("click", () => openChapter(chapIdx));
      storyEl.querySelector("#scPrev").addEventListener("click", () => gotoScene(sceneIdx - 1));
      storyEl.querySelector("#scNext").addEventListener("click", () => {
        if (sceneIdx === scenes.length - 1) openChapter(chapIdx); else gotoScene(sceneIdx + 1);
      });
    }

    function enterFree() {
      storyMode = false; chapIdx = null; threadIdx = null;
      clearStoryOverlays();
      storyEl.style.display = "none";
      panelEl.style.display = "";
      renderSpine();
      show(current);
    }

    document.addEventListener("keydown", e => {
      if (e.target.tagName === "SELECT") return;
      if (storyMode) {
        if (threadIdx == null) return;       // chapter overview: nothing to scrub
        if (e.key === "ArrowLeft") gotoScene(sceneIdx - 1);
        else if (e.key === "ArrowRight") gotoScene(sceneIdx + 1);
        else if (e.key === "v" || e.key === "V") toggleSpy();
        return;
      }
      if (e.key === "ArrowLeft") show(current - 1);
      else if (e.key === "ArrowRight") show(current + 1);
      else if (e.key === " ") { e.preventDefault(); togglePlay(); }
      else if (e.key === "v" || e.key === "V") toggleSpy();
      else if (e.key === "g" || e.key === "G") toggleGrowth();
    });

    // --- Boot: load the manifest. Base layers are local tile pyramids, so they
    // load on demand and year-switches are instant; no preloading needed. ---
    fetch("maps.json")
      .then(r => r.json())
      .then(data => {
        manifest = data;
        // Insert the three WW2 damage stops right after the 1938 map. They reuse
        // the 1938 base (clone), so the city's pre-war footprint shows beneath.
        const base = manifest.find(e => e.year === 1938 && e.type === "map");
        if (base) {
          const stops = WO2_EVENTS.map(ev => Object.assign({}, base, {
            type: "wo2", year: 1944, label: ev.label, era: ev.era,
            wo2cat: ev.cat, wo2order: WO2_ORDER[ev.cat]
          }));
          manifest.splice(manifest.indexOf(base) + 1, 0, ...stops);
        }
        applyFilter("all");     // populate timeline (used by free mode + spyglass)
        renderSpine();
        openChapter(0);         // start the guided tour at the first chapter
      })
      .catch(err => {
        yrText.textContent = "—";
        yrLabel.textContent = "maps.json niet gevonden — draai build_maps.py";
        console.error(err);
      });
  </script>
</body>
</html>
